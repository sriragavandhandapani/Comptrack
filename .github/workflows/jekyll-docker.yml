name: CompTrack CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # Job A: Test and Build
  test-and-build:
    name: Test & Build Codebase
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js 20 environment
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Cache Node.js modules for backend to speed up builds
      - name: Cache Backend Node Modules
        uses: actions/cache@v4
        with:
          path: comptrack-backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('comptrack-backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      # 4. Clean Install Backend Dependencies
      - name: Install Backend Dependencies
        working-directory: ./comptrack-backend
        run: npm ci

      # 5. Run Jest Unit Tests with Coverage (fails if coverage is < 80% as configured in package.json)
      - name: Run Jest with coverage
        working-directory: ./comptrack-backend
        run: npm test -- --coverage
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      # 6. Cache Node.js modules for frontend to speed up builds
      - name: Cache Frontend Node Modules
        uses: actions/cache@v4
        with:
          path: comptrack-frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('comptrack-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      # 7. Clean Install Frontend Dependencies
      - name: Install Frontend Dependencies
        working-directory: ./comptrack-frontend
        run: npm ci

      # 8. Compile Frontend Code (creates standard build folder)
      - name: Build Frontend Application
        working-directory: ./comptrack-frontend
        run: npm run build

  # Job B: Docker Build and Push
  docker-build-push:
    name: Build & Push Docker Images
    needs: test-and-build
    runs-on: ubuntu-latest
    # Run only on pushing to main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # 1. Checkout repository source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up QEMU for multi-platform support (optional but recommended)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Login to Docker Hub using secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build and Push Backend Docker Image
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./comptrack-backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/comptrack-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/comptrack-backend:${{ github.sha }}

      # 6. Build and Push Frontend Docker Image
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./comptrack-frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/comptrack-frontend:latest
